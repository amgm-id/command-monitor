version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: serveragent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serveragent_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      TZ: Asia/Makassar
    ports:
      - "8888:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serveragent_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8880:80"
